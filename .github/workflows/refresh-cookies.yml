name: Refresh YouTube Cookies

on:
  schedule:
    - cron: '0 6 */3 * *'  # каждые 3 дня в 6:00 UTC
  workflow_dispatch:         # ручной запуск из GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Get YouTube cookies
        id: get_cookies
        env:
          GOOGLE_EMAIL:    ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        run: node .github/scripts/get-cookies.js

      - name: Update Render environment variable
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          COOKIES_VALUE:     ${{ env.YT_COOKIES }}
        run: |
          curl -sf -X PUT \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "[{\"key\":\"YT_COOKIES\",\"value\":$(echo "$COOKIES_VALUE" | jq -Rs .)}]"

      - name: Restart Render service
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/restart" \
            -H "Authorization: Bearer ${RENDER_API_KEY}"
          echo "✅ Сервис перезапущен"
